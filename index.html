                fullSentence: "This led to their rapid extinction.",
                parts: [
                    { type: "text", value: "This " },
                    { type: "blank", hint: "l", answer: "ed" }, // Fixed double 'l' display
                    { type: "text", value: " " },
                    { type: "blank", hint: "", answer: "to" },
                    { type: "text", value: " their rapid extinction." }
                ]
            }
        ];

        let japaneseVisible = true;
        let speechSynth = window.speechSynthesis;
        let isSpeakingPlaylist = false;
        let activeSpeakerButton = null;
        let activeSpeakerRowIndex = null;
        let activeSpeechIndex = 0;

        const state = {
            revealedIds: new Set()
        };

        // Extract all blanks dynamically
        const ALL_BLANKS = [];
        chunkData.forEach((row, rowIndex) => {
            row.parts.forEach((part, partIndex) => {
                if (part.type === 'blank') {
                    ALL_BLANKS.push({
                        id: `${rowIndex}-${partIndex}`,
                        rowIndex: rowIndex,
                        partIndex: partIndex,
                        answer: part.answer,
                        hint: part.hint
                    });
                }
            });
        });

        // Render Chunks function
        function renderChunks() {
            const listContainer = document.getElementById('chunks-list');
            listContainer.innerHTML = '';

            chunkData.forEach((row, rowIndex) => {
                const rowDiv = document.createElement('div');
                rowDiv.className = "grid grid-cols-10 border-b border-slate-100 hover:bg-slate-50/40 items-center px-6 py-5 transition-colors";
                rowDiv.id = `row-${rowIndex}`;

                // Column 1: English text container with standard blank parentheses pills
                const englishCol = document.createElement('div');
                englishCol.className = "col-span-10 md:col-span-6 flex items-start gap-4 pr-4 border-r border-slate-50";

                // Number Tag matching the real app [ 1 ] format
                const numBox = document.createElement('div');
                numBox.className = "border border-slate-200 text-slate-400 font-bold text-[11px] w-6 h-6 flex items-center justify-center rounded bg-white mt-1.5 shrink-0 select-none";
                numBox.textContent = row.id;
                englishCol.appendChild(numBox);

                // English Sentence Builder
                const textWrapper = document.createElement('div');
                textWrapper.className = "english-chunk-text flex-1 flex flex-wrap items-center leading-relaxed py-1";

                row.parts.forEach((part, partIndex) => {
                    if (part.type === 'text') {
                        const span = document.createElement('span');
                        span.textContent = part.value;
                        textWrapper.appendChild(span);
                    } else if (part.type === 'blank') {
                        const wordId = `${rowIndex}-${partIndex}`;
                        const isRevealed = state.revealedIds.has(wordId);

                        // The actual parenthesis-wrapped button
                        const pill = document.createElement('button');
                        pill.className = `parenthesis-pill select-none cursor-pointer hover:bg-slate-200 transition-all ${isRevealed ? 'correct' : ''}`;
                        pill.id = `pill-${rowIndex}-${partIndex}`;
                        pill.onclick = () => handleWordClick(rowIndex, partIndex);
                        pill.setAttribute('title', isRevealed ? 'クリックして隠す' : 'クリックして開く');

                        const openChar = document.createElement('span');
                        openChar.className = `parenthesis-char font-sans text-lg mr-1 ${isRevealed ? 'text-emerald-700' : 'text-slate-400'}`;
                        openChar.textContent = "(";
                        pill.appendChild(openChar);

                        // If a hint character exists, display it INSIDE the parenthesis before the word/blank
                        if (part.hint) {
                            const hintText = document.createElement('span');
                            hintText.className = `hint-text-inside mr-0.5 ${isRevealed ? 'text-emerald-700' : ''}`;
                            hintText.textContent = part.hint;
                            pill.appendChild(hintText);
                        }

                        // Answer text or spacing
                        const ansSpan = document.createElement('span');
                        ansSpan.className = `font-times font-bold text-[19px] ${isRevealed ? 'text-emerald-800' : 'text-slate-400'}`;
                        if (isRevealed) {
                            ansSpan.textContent = part.answer;
                        } else {
                            // Render blank space corresponding to answer length (like full-width spaces)
                            const spacesCount = Math.max(1, Math.floor(part.answer.length * 0.8));
                            ansSpan.textContent = "　".repeat(spacesCount);
                        }
                        pill.appendChild(ansSpan);

                        const closeChar = document.createElement('span');
                        closeChar.className = `parenthesis-char font-sans text-lg ml-1 ${isRevealed ? 'text-emerald-700' : 'text-slate-400'}`;
                        closeChar.textContent = ")";
                        pill.appendChild(closeChar);

                        textWrapper.appendChild(pill);
                    }
                });

                englishCol.appendChild(textWrapper);

                // Local Speaker Icon matching screenshot
                const speakerBtn = document.createElement('button');
                speakerBtn.className = "w-8.5 h-8.5 bg-slate-50 border border-slate-200 hover:bg-slate-100 rounded-full flex items-center justify-center text-slate-500 hover:text-blue-600 transition shrink-0 select-none self-center mt-1";
                speakerBtn.innerHTML = `<i data-lucide="volume-2" class="w-4.5 h-4.5"></i>`;
                speakerBtn.onclick = () => speakSentence(row.fullSentence, speakerBtn, rowIndex);
                englishCol.appendChild(speakerBtn);

                rowDiv.appendChild(englishCol);

                // Column 2: Japanese translation
                const japaneseCol = document.createElement('div');
                japaneseCol.className = "japanese-column col-span-10 md:col-span-4 pl-6 py-2 border-slate-100 transition-all";
                if (!japaneseVisible) {
                    japaneseCol.classList.add('hidden');
                }

                const jaText = document.createElement('p');
                jaText.className = "japanese-chunk-text";
                jaText.textContent = row.japanese;
                japaneseCol.appendChild(jaText);

                rowDiv.appendChild(japaneseCol);

                listContainer.appendChild(rowDiv);
            });

            // Re-render Lucide icons for new content
            lucide.createIcons();
            updateRevealedCounter();

            // Perfect Score Check
            if (state.revealedIds.size === ALL_BLANKS.length && ALL_BLANKS.length > 0) {
                document.getElementById('congratsModal').classList.remove('hidden');
            } else {
                document.getElementById('congratsModal').classList.add('hidden');
            }
        }

        // Handle word click (reveal toggle)
        window.handleWordClick = function(rowIndex, partIndex) {
            const wordId = `${rowIndex}-${partIndex}`;
            if (state.revealedIds.has(wordId)) {
                state.revealedIds.delete(wordId);
            } else {
                state.revealedIds.add(wordId);
            }
            renderChunks();
        };

        function updateRevealedCounter() {
            document.getElementById('revealed-count').textContent = state.revealedIds.size;
            document.getElementById('total-count').textContent = ALL_BLANKS.length;
        }

        // Show All Answers instantly
        function showAll() {
            ALL_BLANKS.forEach(w => state.revealedIds.add(w.id));
            renderChunks();
        }

        // Reveal Next Hidden Answer
        function revealNext() {
            const nextBlank = ALL_BLANKS.find(w => !state.revealedIds.has(w.id));
            if (nextBlank) {
                state.revealedIds.add(nextBlank.id);
                renderChunks();
                const btn = document.getElementById(`pill-${nextBlank.rowIndex}-${nextBlank.partIndex}`);
                if (btn) btn.focus();
            }
        }

        // Reset everything
        function resetAll() {
            state.revealedIds.clear();
            stopAllSpeech();
            renderChunks();
        }

        // Close congrats modal
        window.closeCongratsModal = function() {
            document.getElementById('congratsModal').classList.add('hidden');
        };

        // Toggle Japanese Column Visibility (文 日本語: ON / OFF)
        function toggleJapaneseColumn() {
            japaneseVisible = !japaneseVisible;

            const jaColumnHeader = document.getElementById('header-japanese-col');
            const englishColumnHeader = document.getElementById('header-english-col');
            const jaStatus = document.getElementById('ja-status');
            const jaBtn = document.getElementById('ja-toggle-btn');

            if (japaneseVisible) {
                jaColumnHeader.classList.remove('hidden');
                englishColumnHeader.className = "col-span-10 md:col-span-6 border-r border-slate-100 pr-4";
                jaStatus.textContent = "ON";
                jaStatus.className = "text-blue-600 font-extrabold";
            } else {
                jaColumnHeader.classList.add('hidden');
                englishColumnHeader.className = "col-span-10";
                jaStatus.textContent = "OFF";
                jaStatus.className = "text-rose-500 font-extrabold";
            }

            // Redraw content columns
            document.querySelectorAll('.japanese-column').forEach(col => {
                if (japaneseVisible) {
                    col.classList.remove('hidden');
                } else {
                    col.classList.add('hidden');
                }
            });
        }

        // Text-to-speech for single sentence
        function speakSentence(text, btnElement, rowIndex) {
            if (speechSynth.speaking) {
                speechSynth.cancel();
            }

            // Restore state of last button
            if (activeSpeakerButton) {
                activeSpeakerButton.className = "w-8.5 h-8.5 bg-slate-50 border border-slate-200 hover:bg-slate-100 rounded-full flex items-center justify-center text-slate-500 hover:text-blue-600 transition shrink-0 select-none self-center mt-1";
                activeSpeakerButton.innerHTML = `<i data-lucide="volume-2" class="w-4.5 h-4.5"></i>`;
            }

            // Style active speaker row
            btnElement.className = "w-8.5 h-8.5 bg-blue-100 border border-blue-400 rounded-full flex items-center justify-center text-blue-600 transition shrink-0 select-none self-center mt-1";
            btnElement.innerHTML = `<i data-lucide="volume-x" class="w-4.5 h-4.5"></i>`;
            lucide.createIcons();

            activeSpeakerButton = btnElement;
            activeSpeakerRowIndex = rowIndex;

            const selectedLang = document.getElementById('voice-select').value;
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = selectedLang;
            utterance.rate = 0.9;

            utterance.onend = () => {
                btnElement.className = "w-8.5 h-8.5 bg-slate-50 border border-slate-200 hover:bg-slate-100 rounded-full flex items-center justify-center text-slate-500 hover:text-blue-600 transition shrink-0 select-none self-center mt-1";
                btnElement.innerHTML = `<i data-lucide="volume-2" class="w-4.5 h-4.5"></i>`;
                lucide.createIcons();
                activeSpeakerButton = null;
                activeSpeakerRowIndex = null;
            };

            speechSynth.speak(utterance);
        }

        // Global TTS Play list
        function toggleGlobalSpeech() {
            if (isSpeakingPlaylist) {
                stopAllSpeech();
                return;
            }

            isSpeakingPlaylist = true;
            activeSpeechIndex = 0;
            updateGlobalPlayButton(true);
            playNextPlaylistSentence();
        }

        // Play next playlist sentence
        function playNextPlaylistSentence() {
            if (!isSpeakingPlaylist || activeSpeechIndex >= chunkData.length) {
                stopAllSpeech();
                return;
            }

            const currentObj = chunkData[activeSpeechIndex];
            const targetRow = document.getElementById(`row-${activeSpeechIndex}`);

            // Visual Highlight active speaking row
            targetRow.classList.add('bg-blue-50/70');

            const selectedLang = document.getElementById('voice-select').value;
            const utterance = new SpeechSynthesisUtterance(currentObj.fullSentence);
            utterance.lang = selectedLang;
            utterance.rate = 0.9;

            utterance.onend = () => {
                targetRow.classList.remove('bg-blue-50/70');
                activeSpeechIndex++;
                playNextPlaylistSentence();
            };

            speechSynth.speak(utterance);
        }

        // Stop all speech
        function stopAllSpeech() {
            speechSynth.cancel();
            isSpeakingPlaylist = false;
            updateGlobalPlayButton(false);

            // Reset highlighted rows
            for (let i = 0; i < chunkData.length; i++) {
                const row = document.getElementById(`row-${i}`);
                if (row) row.classList.remove('bg-blue-50/70');
            }

            // Reset active row speak button
            if (activeSpeakerButton) {
                activeSpeakerButton.className = "w-8.5 h-8.5 bg-slate-50 border border-slate-200 hover:bg-slate-100 rounded-full flex items-center justify-center text-slate-500 hover:text-blue-600 transition shrink-0 select-none self-center mt-1";
                activeSpeakerButton.innerHTML = `<i data-lucide="volume-2" class="w-4.5 h-4.5"></i>`;
                lucide.createIcons();
                activeSpeakerButton = null;
                activeSpeakerRowIndex = null;
            }
        }

        function updateGlobalPlayButton(isPlaying) {
            const playText = document.getElementById('global-play-text');
            const playIcon = document.getElementById('global-play-icon');
            const playBtn = document.getElementById('global-play-btn');

            if (isPlaying) {
                playText.textContent = "Stop";
                playIcon.setAttribute('data-lucide', 'square');
                playBtn.className = "bg-rose-600 hover:bg-rose-700 text-white px-4 py-1.5 rounded-md text-xs font-bold flex items-center gap-1.5 transition shadow-sm";
            } else {
                playText.textContent = "Play";
                playIcon.setAttribute('data-lucide', 'play');
                playBtn.className = "bg-[#2563eb] hover:bg-blue-600 text-white px-4 py-1.5 rounded-md text-xs font-bold flex items-center gap-1.5 transition shadow-sm";
            }
            lucide.createIcons();
        }

        // Initialize Rendering
        window.onload = function () {
            renderChunks();
        }
    </script>
</body>
</html>
